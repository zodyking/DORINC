# DORINC Suite — Docker Compose for Dockploy
#
# Dockploy env (only these):
#   PORT=38471         # container listen port (must match Domains → Port)
#   APP_URL=https://…  # public URL
#
# Do NOT publish host ports — Dockploy Traefik routes via Domains.
# Default is 38471 to avoid clashing with Dockploy and common app ports.
# Everything else (database, security keys, SMTP, AI) is configured in /setup.

services:
  nuxt-app:
    build:
      context: .
      dockerfile: docker/Dockerfile.app
    restart: unless-stopped
    # Internal only — Dokploy Domains / Traefik reach this port on the Docker network.
    expose:
      - '${PORT:-38471}'
    volumes:
      - dorinc-runtime:/app/.data
    environment:
      NODE_ENV: production
      PORT: ${PORT:-38471}
      NITRO_PORT: ${PORT:-38471}
      NITRO_HOST: 0.0.0.0
      APP_URL: ${APP_URL}
    healthcheck:
      test: ['CMD-SHELL', 'wget -qO- "http://127.0.0.1:$$PORT/api/health" || exit 1']
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 15s

  worker:
    build:
      context: .
      dockerfile: docker/Dockerfile.worker
    restart: unless-stopped
    profiles: ['workers']
    volumes:
      - dorinc-runtime:/app/.data
    environment:
      NODE_ENV: production
      WORKER_KIND: general
      APP_URL: ${APP_URL:-}

  pdf-worker:
    build:
      context: .
      dockerfile: docker/Dockerfile.pdf-worker
    restart: unless-stopped
    profiles: ['workers']
    volumes:
      - dorinc-runtime:/app/.data
    environment:
      NODE_ENV: production
      WORKER_KIND: pdf
      APP_URL: ${APP_URL:-}

  # Optional: apply migrations when upgrading (first install runs migrate via /setup).
  migrate:
    build:
      context: .
      dockerfile: docker/Dockerfile.worker
    profiles: ['migrate']
    restart: 'no'
    volumes:
      - dorinc-runtime:/app/.data
    command: ['node', 'scripts/migrate.mjs']

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    profiles: ['redis']
    volumes:
      - redis-data:/data

volumes:
  redis-data:
  dorinc-runtime:
