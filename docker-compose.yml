# DORINC Suite — Docker Compose for Dockploy
#
# Dockploy env:
#   PORT=38471         # container listen port (must match Domains → Port)
#   APP_URL=https://…  # public URL
#   DATABASE_URL=…     # optional override (recommended if workers cannot resolve setup host)
#
# Services deployed together: nuxt-app + worker + pdf-worker + laravel-pdf (mail, PDF, backups, AI).
# All services join dokploy-network so linked Postgres hostnames resolve from workers too.
# Optional profiles: migrate (one-shot), redis (not required for Phase 1).

services:
  nuxt-app:
    build:
      context: .
      dockerfile: docker/Dockerfile.app
    restart: unless-stopped
    # Internal only — Dokploy Domains / Traefik reach this port on the Docker network.
    expose:
      - '${PORT:-38471}'
    volumes:
      - dorinc-runtime:/app/.data
    environment:
      NODE_ENV: production
      PORT: ${PORT:-38471}
      NITRO_PORT: ${PORT:-38471}
      NITRO_HOST: 0.0.0.0
      APP_URL: ${APP_URL}
      DATABASE_URL: ${DATABASE_URL:-}
      PDF_RENDER_URL: ${PDF_RENDER_URL:-http://laravel-pdf:8080}
    networks:
      - dokploy-network
    depends_on:
      laravel-pdf:
        condition: service_healthy
    healthcheck:
      test: ['CMD-SHELL', 'wget -qO- "http://127.0.0.1:$$PORT/api/health" || exit 1']
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 15s

  worker:
    build:
      context: .
      dockerfile: docker/Dockerfile.worker
    restart: unless-stopped
    volumes:
      - dorinc-runtime:/app/.data
    environment:
      NODE_ENV: production
      WORKER_KIND: general
      WORKER_POLL_MS: ${WORKER_POLL_MS:-1500}
      MAIL_BATCH_SIZE: ${MAIL_BATCH_SIZE:-20}
      APP_URL: ${APP_URL:-}
      DATABASE_URL: ${DATABASE_URL:-}
    networks:
      - dokploy-network

  pdf-worker:
    build:
      context: .
      dockerfile: docker/Dockerfile.pdf-worker
    restart: unless-stopped
    volumes:
      - dorinc-runtime:/app/.data
    environment:
      NODE_ENV: production
      WORKER_KIND: pdf
      APP_URL: ${APP_URL:-}
      DATABASE_URL: ${DATABASE_URL:-}
      PDF_RENDER_URL: ${PDF_RENDER_URL:-http://laravel-pdf:8080}
    networks:
      - dokploy-network
    depends_on:
      - laravel-pdf

  laravel-pdf:
    build:
      context: .
      dockerfile: docker/Dockerfile.laravel-pdf
    restart: unless-stopped
    expose:
      - '8080'
    networks:
      - dokploy-network
    healthcheck:
      test: ['CMD-SHELL', 'php -r "exit(@file_get_contents(\"http://127.0.0.1:8080/health\") ? 0 : 1);"']
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  # Optional one-shot migrate. Upgrades normally rely on boot migrate in nuxt-app/worker/pdf-worker.
  migrate:
    build:
      context: .
      dockerfile: docker/Dockerfile.worker
    profiles: ['migrate']
    restart: 'no'
    volumes:
      - dorinc-runtime:/app/.data
    environment:
      DATABASE_URL: ${DATABASE_URL:-}
    networks:
      - dokploy-network
    command: ['node', 'scripts/migrate.mjs']

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    profiles: ['redis']
    volumes:
      - redis-data:/data
    networks:
      - dokploy-network

networks:
  dokploy-network:
    external: true

volumes:
  redis-data:
  dorinc-runtime:
